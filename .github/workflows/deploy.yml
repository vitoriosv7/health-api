name: Deploy Health API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/health-api

            echo "Atualizando código..."
            git pull origin main

            echo "Build das imagens..."
            docker build -t health-api:blue .
            docker build -t health-api:green .

            echo "Subindo containers..."
            docker rm -f health-api-container || true
            docker rm -f health-api-green || true

            docker run -d -p 8001:8000 --name health-api-container health-api:blue
            docker run -d -p 8002:8000 --name health-api-green health-api:green

            echo "Switch Blue/Green..."
            chmod +x scripts/switch.sh
            ./scripts/switch.sh

            echo "Deploy finalizado 🚀"
