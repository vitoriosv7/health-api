events {
    worker_connections 1024;
}

http {
    upstream backend {
        ##server host.docker.internal:8001;
        server host.docker.internal:8002;
        server host.docker.internal:8002;  # Blue ativo
        # server host.docker.internal:8002; # Green
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
        }
    }
}
